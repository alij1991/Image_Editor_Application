name: image_editor
description: "Professional non-destructive image editor"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Image I/O & processing
  image: ^4.7.2
  image_cropper: ^11.0.0
  extended_image: ^10.0.1
  flutter_image_compress: ^2.4.0
  image_picker: ^1.1.2
  exif: ^3.3.0
  screenshot: ^3.0.0

  # Native OpenCV bindings for the document scanner — perspective
  # warp + Hough deskew. ~20 MB per ABI; Native Assets means no
  # gradle/pod tweaks required (Flutter 3.38+).
  opencv_dart: ^2.2.1+4

  # Filters, drawing, shaders
  flutter_drawing_board: ^1.0.1+2
  colorfilter_generator: ^0.0.8

  # ML runtimes — TFLite (successor package) & ONNX
  # flutter_litert and image_magic_eraser to be added when verified available
  google_mlkit_selfie_segmentation: ^0.10.0
  google_mlkit_face_detection: ^0.13.0
  google_mlkit_commons: 0.11.0  # pin: 0.11.1 requires MLKitVision 10.0.0 not yet on CocoaPods
  google_mlkit_text_recognition: ^0.15.0

  # Document scanner (Phase 10). Cross-platform native wrapper that uses
  # Google ML Kit on Android and Apple VisionKit on iOS.
  cunning_document_scanner: ^1.3.0

  # PDF / printing (Phase 10). Pure-Dart PDF builder + share/print.
  pdf: ^3.11.0
  printing: ^5.13.0
  archive: ^4.0.0

  # State management
  flutter_riverpod: ^2.5.1
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Persistence
  sqflite: ^2.4.0
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Navigation + UX
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  flutter_svg: ^2.0.10
  flutter_colorpicker: ^1.1.0
  share_plus: ^10.0.2

  # Networking (model downloads)
  dio: ^5.7.0
  crypto: ^3.0.5
  http: ^1.2.2

  # Utilities
  collection: ^1.18.0
  logger: ^2.4.0
  uuid: ^4.5.1
  intl: ^0.20.2
  synchronized: ^3.3.0+3
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  permission_handler: ^12.0.1

  # On-device ML runtimes (Phase 9a). Native libraries for Android
  # ship from the package itself; iOS requires `pod install`.
  flutter_litert: ^2.0.11
  onnxruntime_v2: ^1.17.0

  # TODO(phase 9g+): re-add when needed
  # image_magic_eraser: ^0.6.0           # LaMa wrapper (Phase 9g)

  # TODO(phase 10): re-add when Rust toolchain is installed
  # flutter_rust_bridge: ^2.12.0
  # opencv_dart: ^1.3.0
  # native_filters: ^0.7.0
  # image_gallery_saver: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  # FFI-backed sqflite for unit tests. The real `sqflite` plugin needs
  # a platform channel, which isn't available in `flutter_test`. This
  # swap-in uses bundled sqlite via FFI so schema-migration tests
  # (e.g. `PresetRepository` onUpgrade, Phase IV.3) can drive a real
  # database file.
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/models/bundled/
    - assets/models/manifest.json
    - assets/luts/
    - assets/luts/manifest.json
    - assets/presets/
    - assets/presets/manifest.json
    - assets/stickers/
    - assets/stickers/manifest.json
    - assets/overlays/light_leaks/
    - assets/overlays/dust/
    - assets/overlays/bokeh/

  shaders:
    - shaders/color_grading.frag
    - shaders/hsl.frag
    - shaders/curves.frag
    - shaders/highlights_shadows.frag
    - shaders/vibrance.frag
    - shaders/clarity.frag
    - shaders/dehaze.frag
    - shaders/split_toning.frag
    - shaders/levels_gamma.frag
    - shaders/lut3d.frag
    - shaders/bilateral_denoise.frag
    - shaders/tilt_shift.frag
    - shaders/motion_blur.frag
    - shaders/radial_blur.frag
    - shaders/vignette.frag
    - shaders/grain.frag
    - shaders/chromatic_aberration.frag
    - shaders/glitch.frag
    - shaders/pixelate.frag
    - shaders/halftone.frag
    - shaders/sharpen_unsharp.frag
    - shaders/before_after_wipe.frag
    - shaders/perspective_warp.frag
